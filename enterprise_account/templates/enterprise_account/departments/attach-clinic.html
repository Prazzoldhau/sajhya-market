{% extends 'base.html' %}
{% load static %}

{% block title %}Attach Clinic{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fas fa-hospital fa-2x mb-2"></i>
                <h3>Attach Clinic</h3>
                <p>{{ department.department_name }}</p>
            </div>
            <div class="auth-body">
                <form method="post" novalidate>
                    {% csrf_token %}

                    <div class="form-group">
                        <label class="form-label">Search clinic <span class="text-danger">*</span></label>
                        <input type="text" id="clinicSearch" class="form-control" placeholder="Search by clinic name or code" autocomplete="off">
                        <div id="clinicResults" style="border:1px solid #eee; border-radius:8px; margin-top:4px; display:none;"></div>
                        <input type="hidden" name="clinic_id" id="clinicId" required>
                        <small class="form-text text-muted" id="selectedClinicLabel"></small>
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn-gradient">
                            Attach <i class="fas fa-check-circle"></i>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
const searchInput = document.getElementById('clinicSearch');
const resultsBox = document.getElementById('clinicResults');
const clinicIdField = document.getElementById('clinicId');
const selectedLabel = document.getElementById('selectedClinicLabel');

let debounceTimer;
searchInput.addEventListener('input', function () {
    clearTimeout(debounceTimer);
    const query = this.value.trim();
    clinicIdField.value = '';
    if (query.length < 2) {
        resultsBox.style.display = 'none';
        resultsBox.innerHTML = '';
        return;
    }
    debounceTimer = setTimeout(function () {
        fetch(`{% url 'search-enterprise-clinics' %}?q=${encodeURIComponent(query)}`)
            .then(res => res.json())
            .then(data => {
                resultsBox.innerHTML = '';
                if (data.length === 0) {
                    resultsBox.style.display = 'none';
                    return;
                }
                data.forEach(clinic => {
                    const item = document.createElement('div');
                    item.style.padding = '8px';
                    item.style.cursor = 'pointer';
                    item.textContent = `${clinic.clinic_name} (${clinic.clinic_code})`;
                    item.addEventListener('click', function () {
                        clinicIdField.value = clinic.id;
                        searchInput.value = `${clinic.clinic_name} (${clinic.clinic_code})`;
                        selectedLabel.textContent = `Selected: ${clinic.clinic_code}`;
                        resultsBox.style.display = 'none';
                    });
                    resultsBox.appendChild(item);
                });
                resultsBox.style.display = 'block';
            });
    }, 250);
});
</script>
{% endblock %}

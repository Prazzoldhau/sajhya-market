{% extends 'base.html' %}
{% load static %}

{% block title %}Check - Sajhya Healthcare{% endblock %}

{% block content %}
<div class="container">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h3>Welcome</h3>
                <p>Enterprise let's get started</p>
            </div>
            <div class="auth-body">
                <div class="d-grid gap-2">
                    <a href="{% url 'login-enterprise'%}" class="btn-gradient-a">
                        Login to your enterprise
                    </a>
                </div>

                <hr class="my-4">

                <!-- Create New Enterprise Button -->
                <div class="d-grid gap-2">
                    <a href="{% url 'signup-enterprise'%}" class="btn-gradient">
                        Create New Enterprise Account
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

{%endblock%}
